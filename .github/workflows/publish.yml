name: Publish to PyPI

# Fires on every version tag (release.yml drafts the GitHub Release notes from
# the same tag, in parallel). Builds the sdist + wheel and uploads to PyPI via
# Trusted Publishing — no stored token: configure the trusted publisher once at
# https://pypi.org/manage/project/agy-mcp-server/settings/publishing/
#   Owner: SinanTufekci  Repo: antigravity-intern
#   Workflow: publish.yml  Environment: pypi

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agy-mcp-server
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify version tag matches pyproject
        run: |
          PKG=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject=$PKG  tag=$TAG"
          test "$PKG" = "$TAG" || { echo "::error::tag $TAG != pyproject version $PKG"; exit 1; }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
