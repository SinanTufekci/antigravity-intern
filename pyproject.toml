[project]
name = "agy-mcp-server"
version = "0.2.0"
description = "MCP server bridging Antigravity CLI (agy) so Claude Code can use it as a sub-agent"
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=2.0.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
